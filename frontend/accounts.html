<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskGuard - System Accounts</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="tg-topbar d-flex align-items-center justify-content-between px-3">
    <span class="tg-brand"><i class="bi bi-shield-lock-fill"></i>TaskGuard</span>
    <span class="text-light small" id="userGreeting"></span>
</nav>

<div class="d-flex">
    <div class="tg-sidebar" style="width:230px;">
        <div class="list-group rounded-0" id="sidebarNav"></div>
    </div>

    <div class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0">System Accounts Directory</h3>
            <button class="btn btn-brand" id="addBtn">
                <i class="bi bi-plus-lg"></i> Provision Account
            </button>
        </div>

        <div class="filter-bar row g-2 align-items-end">
            <div class="col-md-4">
                <label class="form-label mb-1">Filter by Role</label>
                <select id="roleFilter" class="form-select">
                    <option value="ALL">All Domain Roles</option>
                    <option value="PROJECT_DIRECTOR">PROJECT_DIRECTOR</option>
                    <option value="PROJECT_MANAGER">PROJECT_MANAGER</option>
                    <option value="TEAM_CONTRIBUTOR">TEAM_CONTRIBUTOR</option>
                </select>
            </div>
        </div>

        <div class="card shadow-sm table-card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="accountsTableBody"></tbody>
                </table>
                <div class="empty-state" id="emptyState" style="display:none;">
                    <i class="bi bi-inbox"></i>
                    No accounts found.
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal fade" id="accountModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Create New Account</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="accountForm">
                    <input type="hidden" id="accountId">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="fullName" class="form-control" placeholder="e.g. Senior Specialist Michael Chang">
                        <span class="field-error" id="fullNameError"></span>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="text" id="email" class="form-control" placeholder="user@company.com">
                        <span class="field-error" id="emailError"></span>
                    </div>
                    <div class="mb-3" id="passwordField">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Minimum 6 characters">
                        <span class="field-error" id="passwordError"></span>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Domain Role</label>
                        <select id="domainRole" class="form-select">
                            <option value="PROJECT_DIRECTOR">PROJECT_DIRECTOR</option>
                            <option value="PROJECT_MANAGER">PROJECT_MANAGER</option>
                            <option value="TEAM_CONTRIBUTOR" selected>TEAM_CONTRIBUTOR</option>
                        </select>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" id="saveBtn" class="btn btn-brand">Save Account</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/common.js"></script>
<script src="js/accounts.js"></script>
</body>
</html>
