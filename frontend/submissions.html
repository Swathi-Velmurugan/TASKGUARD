<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskGuard - Submissions</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="tg-topbar d-flex align-items-center justify-content-between px-3">
    <span class="tg-brand"><i class="bi bi-shield-lock-fill"></i>TaskGuard</span>
    <span class="text-light small" id="userGreeting"></span>
</nav>

<div class="d-flex">
    <div class="tg-sidebar" style="width:230px;">
        <div class="list-group rounded-0" id="sidebarNav"></div>
    </div>

    <div class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0">Task Submissions</h3>
            <button class="btn btn-brand" id="addBtn" style="display:none;">
                <i class="bi bi-plus-lg"></i> Log Work Submission
            </button>
        </div>

        <div class="filter-bar row g-2 align-items-end">
            <div class="col-md-6">
                <label class="form-label mb-1">Filter by Task</label>
                <select id="taskFilter" class="form-select">
                    <option value="">All Tasks</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-outline-secondary w-100" id="clearFilterBtn">Clear</button>
            </div>
        </div>

        <div class="card shadow-sm table-card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Sub ID</th>
                            <th>Task</th>
                            <th>Contributor</th>
                            <th>Hours</th>
                            <th>Notes / Feedback</th>
                            <th>Status</th>
                            <th id="actionsHeader" style="display:none;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="submissionsTableBody"></tbody>
                </table>
                <div class="empty-state" id="emptyState" style="display:none;">
                    <i class="bi bi-inbox"></i>
                    No submissions found.
                </div>
            </div>
        </div>
    </div>
</div>

<!-- LOG WORK MODAL (contributor only) -->
<div class="modal fade" id="submissionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Log Work Submission</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="submissionForm">
                    <div class="mb-3">
                        <label class="form-label">Assigned Task</label>
                        <select id="taskId" class="form-select"></select>
                        <span class="field-error" id="taskIdError"></span>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Hours Spent</label>
                        <input type="number" id="hoursSpent" class="form-control" placeholder="8">
                        <span class="field-error" id="hoursSpentError"></span>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Submission Notes</label>
                        <textarea id="submissionNotes" class="form-control" rows="3" placeholder="Detail work items completed, code pushed, or tests verified..."></textarea>
                        <span class="field-error" id="submissionNotesError"></span>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" id="submitBtn" class="btn btn-brand">Finalize Submission</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/common.js"></script>
<script src="js/submissions.js"></script>
</body>
</html>
