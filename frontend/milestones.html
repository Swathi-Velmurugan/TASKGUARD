<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskGuard - Milestones</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="tg-topbar d-flex align-items-center justify-content-between px-3">
    <span class="tg-brand"><i class="bi bi-shield-lock-fill"></i>TaskGuard</span>
    <span class="text-light small" id="userGreeting"></span>
</nav>

<div class="d-flex">
    <div class="tg-sidebar" style="width:230px;">
        <div class="list-group rounded-0" id="sidebarNav"></div>
    </div>

    <div class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0">Project Milestones</h3>
            <button class="btn btn-brand" id="addBtn" style="display:none;">
                <i class="bi bi-plus-lg"></i> Add Milestone
            </button>
        </div>

        <div class="filter-bar row g-2 align-items-end">
            <div class="col-md-4">
                <label class="form-label mb-1">Search by title</label>
                <input type="text" id="searchText" class="form-control" placeholder="Search milestones...">
            </div>
            <div class="col-md-4">
                <label class="form-label mb-1">Initiative</label>
                <select id="initiativeFilter" class="form-select">
                    <option value="">All Initiatives</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label mb-1">Status</label>
                <select id="statusFilter" class="form-select">
                    <option value="ALL">ALL</option>
                    <option value="PENDING">PENDING</option>
                    <option value="IN_PROGRESS">IN_PROGRESS</option>
                    <option value="ACHIEVED">ACHIEVED</option>
                </select>
            </div>
            <div class="col-md-1">
                <button class="btn btn-outline-secondary w-100" id="clearFilterBtn" title="Clear filters">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
        </div>

        <div class="card shadow-sm table-card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Phase ID</th>
                            <th>Title</th>
                            <th>Initiative</th>
                            <th>Target Date</th>
                            <th>Allocated Hours</th>
                            <th>Status</th>
                            <th id="actionsHeader" style="display:none;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="milestonesTableBody"></tbody>
                </table>
                <div class="empty-state" id="emptyState" style="display:none;">
                    <i class="bi bi-inbox"></i>
                    No project milestones found.
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal fade" id="milestoneModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Create New Milestone</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="milestoneForm">
                    <input type="hidden" id="milestoneId">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" id="title" class="form-control" placeholder="e.g. Core Database Replication Verification">
                        <span class="field-error" id="titleError"></span>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Parent Initiative</label>
                        <select id="initiativeId" class="form-select"></select>
                        <span class="field-error" id="initiativeIdError"></span>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Target Date</label>
                        <input type="date" id="targetDate" class="form-control">
                        <span class="field-error" id="targetDateError"></span>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Allocated Hours</label>
                        <input type="number" id="allocatedHours" class="form-control" placeholder="120">
                        <span class="field-error" id="allocatedHoursError"></span>
                    </div>
                    <div class="mb-3" id="statusField" style="display:none;">
                        <label class="form-label">Status</label>
                        <select id="status" class="form-select">
                            <option value="PENDING">PENDING</option>
                            <option value="IN_PROGRESS">IN_PROGRESS</option>
                            <option value="ACHIEVED">ACHIEVED</option>
                        </select>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" id="saveBtn" class="btn btn-brand">Save Milestone</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/common.js"></script>
<script src="js/milestones.js"></script>
</body>
</html>
